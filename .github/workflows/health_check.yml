name: Periodic health check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployed app health
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://fs-pokedex-tfkt.onrender.com/
          max-attempts: 3
          retry-delay: 10s
          follow-redirect: true