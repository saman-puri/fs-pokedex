name: Periodic health check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name:  Check the deployed service URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fs-pokedex-tfkt.onrender.com/
          max-attempts: 3
          retry-delay: 5s
          follow-redirect: false